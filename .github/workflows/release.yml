name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../svgm-${{ matrix.target }}.tar.gz svgm
      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path target/${{ matrix.target }}/release/svgm.exe -DestinationPath svgm-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: svgm-${{ matrix.target }}
          path: svgm-${{ matrix.target }}.*

  wasm:
    name: Publish WASM to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - run: wasm-pack build crates/svgm-wasm --target web
      - name: Set npm package name
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('pkg/package.json'));p.name='svgm-wasm';fs.writeFileSync('pkg/package.json',JSON.stringify(p,null,2)+'\n')"
        working-directory: crates/svgm-wasm
      - name: Verify package name
        run: |
          node -e "const p = require('./pkg/package.json'); if (p.name !== 'svgm-wasm') throw new Error('unexpected name: ' + p.name)"
        working-directory: crates/svgm-wasm
      - run: npm publish --access public --provenance
        working-directory: crates/svgm-wasm/pkg

  napi:
    name: Build NAPI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: napi-${{ matrix.target }}
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm install
        working-directory: crates/svgm-napi
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools
      - run: npx napi build --release --platform --target ${{ matrix.target }}
        working-directory: crates/svgm-napi
      - uses: actions/upload-artifact@v4
        with:
          name: napi-${{ matrix.target }}
          path: crates/svgm-napi/*.node

  napi-publish:
    name: Publish NAPI to npm
    needs: napi
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v4
        with:
          pattern: napi-*
          path: crates/svgm-napi/artifacts
          merge-multiple: true
      - run: npm install
        working-directory: crates/svgm-napi
      - run: npx napi pre-publish --no-gh-release
        working-directory: crates/svgm-napi
      - run: npm publish --access public --provenance
        working-directory: crates/svgm-napi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: svgm-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: svgm-*
