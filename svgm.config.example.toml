# svgm configuration
# Copy to svgm.config.toml in your project root.
# svgm auto-discovers this by walking up from the input file.

# preset = "default"    # safe | default
# precision = 3          # decimal digits (default: 3)

[passes]
# removeDesc = true       # opt-in: strip <desc> and <title>
# collapseGroups = false   # opt-out: keep <g> wrappers as-is
