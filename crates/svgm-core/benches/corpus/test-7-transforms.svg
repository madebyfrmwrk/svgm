<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Editor export with deep transform nesting -->
  <g transform="translate(0, 0)">
    <g transform="translate(50, 50)">
      <g transform="scale(1)">
        <rect x="0" y="0" width="100" height="80" fill="blue"/>
      </g>
    </g>
  </g>
  <g transform="translate(200, 0)">
    <g transform="translate(10, 20)">
      <circle cx="50" cy="50" r="40" fill="red"/>
    </g>
  </g>
  <g transform="translate(0, 200)">
    <g transform="rotate(45) rotate(-45)">
      <rect x="10" y="10" width="60" height="60" fill="green"/>
    </g>
  </g>
  <g transform="translate(200, 200)">
    <line x1="0" y1="0" x2="100" y2="100" stroke="black" stroke-width="2" transform="translate(10, 10)"/>
    <ellipse cx="50" cy="50" rx="30" ry="20" fill="orange" transform="translate(5, 5)"/>
  </g>
  <g transform="translate(100, 100) scale(2) translate(-50, -50)">
    <rect x="0" y="0" width="50" height="50" fill="purple" opacity="0.5"/>
  </g>
  <g transform="scale(1, 1)">
    <text x="10" y="380" font-size="14">Transform test</text>
  </g>
</svg>
